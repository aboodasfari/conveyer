<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2329"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- C-loop: an open arc evoking Copilot's mark + a conveyor belt -->
  <path d="
    M 740 320
    A 240 240 0 1 0 740 704"
    fill="none" stroke="url(#arc)" stroke-width="78" stroke-linecap="round"/>
  <!-- chevron riding the belt, suggesting flow/forward motion -->
  <g transform="translate(540 512)" fill="none" stroke="#ffffff" stroke-width="50" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 -90 L 90 0 L 0 90"/>
  </g>
</svg>
